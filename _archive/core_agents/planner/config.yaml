name: planner
version: 1

models:
  main: claude-sonnet-4-6   # Stage 1, 2, 4, 6 — 전략 판단 단계 (Anthropic)
  mini: gpt-4.1-mini        # Stage 3 — 소재 중복 병렬 판단 (OpenAI)

guides_path: core/agents/planner

archive:
  runs_dir: archive/planner/runs

quality_gate:
  min_selected: 1      # 이 수 미만이면 경고 (파이프라인 중단 안 함)

publishing:
  # monthly_count는 target_month의 실제 월·수·금 개수로 자동 계산됨 (코드 참조)
  # 예: 2026-02 → 12, 2026-03 → 13
  days_of_week: [월, 수, 금]
  publish_time: "09:00"
  timezone: Asia/Seoul

duplicate:
  high_risk_threshold: 0.70
  angle_shift_threshold: 0.40
  weights:
    keyword_overlap: 0.4
    title_similarity: 0.3
    topic_overlap: 0.3

funnel:
  dominance_threshold: 0.70   # 이 비율 초과 시 퍼널 편향으로 판단
  swap_enabled: false          # 자동 퍼널 교체 비활성화 (경고만 로깅)

# 입력 검증용 허용값 — input_template.md와 동기화
valid_intents:
  - 정보 탐색
  - 비교 판단
  - 추천

valid_directions:
  - 카테고리 포지셔닝
  - 문제 인식 확산
  - 판단 기준 제시
  - 실행 가이드
